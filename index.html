<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./styles/style.css">
    <title>Tour of DOM</title>

    <style>
        h1 {
            color: red;
        }

        #food-title {
            color: green;
        }

        body {
            background-color: bisque;
        }
    </style>
</head>

<body>

    <header>
        <h1>This is Header. Not Banner</h1>

    </header>


    <main>

        <h1>Welcome to DOM Fundamentals</h1>
        <ul>
            <li class="foreign">Smarto</li>
            <li>Bonobash</li>
            <li>Nishshongo Ekaki</li>
            <li id="band">Shironamhin</li>
            <li class="international">International</li>
        </ul>

        <section>
            <h1 id="food-title">Foods I love</h1>
            <ul>
                <li>Rice</li>
                <li>Potato</li>
                <li>Fish</li>
                <li>Lentil</li>
                <li class="foreign">Burger</li>
                <li class="foreign">Pizza</li>
                <li class="foreign">Pasta</li>
            </ul>
        </section>


        <div class="p-tags">
            <p>Md. Babul Mia</p>
            <p>Md. Bayjid Alom</p>
            <p>Md. Jubaeid Alom</p>
        </div>

    </main>


    <!--✔️ Inline -->

    <!--✔️ Internal -->
    <script>

        console.log("Hello javascript")
        console.log("Document Object Model")
        const student = {
            name: "Bayjid Alom",
            id: 110,
            study: function (subject) {
                console.log("Studying subject :", subject)
            }
        }

        // getElementsByTagName("li")
        const liCollection = document.getElementsByTagName("li");  //  [ এরের মতো হবে ]
        console.log(liCollection)

        for (const li of liCollection) {
            console.log(li.innerText)
        }

        const allHeadings = document.getElementsByTagName("h1");
        for (const heading of allHeadings) {
            console.log(heading.innerText)
        }

        const AllPTags = document.getElementsByTagName("p");
        for (const pTag of AllPTags) {
            console.log(pTag.innerText)
        }


        // getElementById("id-name")
        const foodTitleH1 = document.getElementById("food-title");
        console.log(foodTitleH1.innerText)

        const bandElement = document.getElementById('band');
        bandElement.innerText = "Confusion Ache!"
        console.log(bandElement)


        // getElementsByClassName("class-name")
        const foreignElements = document.getElementsByClassName("foreign");
        console.log(foreignElements)

        for (const element of foreignElements) {
            console.log(element)
        }

    </script>


    <!--✔️ External -->
    <script src="./script/01_hello.js"></script>
</body>

</html>
